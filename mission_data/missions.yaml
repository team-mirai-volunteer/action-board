  - slug: join-719-mic-osame
    title: 7/19(土)のマイク納めに参加しよう
    icon_url: /img/mission-icons/actionboard_icon_work_20250719_ol_join-mic-osame.svg
    content: |-
      7/19(土)に「マイク納め」イベントを開催します！ ✨🔥
      多くの人に集まっていただきメディアに注目新党として取り上げてもらうことで、今後のメディア露出の時間や頻度が大きく変わる、とても重要なイベントです。
      ぜひ皆さまご参加をお願いいたします！！

      ■7/19(土) マイク納め
      【北海道】19:00- @札幌駅南口（稲原むねよし）
      【宮城】19:30- @仙台三越前（角野なすか）
      【埼玉】17:30- @浦和駅東口（武藤かず子）
      【千葉】17:00- @流山おおたかの森駅西口（小林しゅうへい）
      【東京】19:00- @丸の内駅前広場（みねしま侑也・安野たかひろ）
      【神奈川】19:00- @武蔵小杉駅北口（河合みちお）
      【長野】19:15- @小諸駅近く 相生坂公園（山田ゆうじ）
      【愛知】19:00- @名古屋駅太閤通口（山根ゆきや・須田えいたろう）
      【大阪】19:00- @梅田 HEP FIVE前（平りさこ）
      【兵庫】19:00- @神戸大丸前（前田みさ）
      【愛媛】19:00- @松山市大街頭商店街入り口（川端ゆうすけ）
      【福岡】19:30- @天神ワンビル（ワン・フクオカ・ビルディング）前（古川あおい）

      現地の状況により、場所・時間が変更になる場合がございます。最新情報は、候補者のXアカウント、または<a href="https://team-mirai.notion.site/7-19-231f6f56bae180cba059c38f7c9e7567" target="_blank" rel="noopener noreferrer">こちらのページ</a>をご確認ください。

      ▼公認候補者・SNSアカウント一覧
